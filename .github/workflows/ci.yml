name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installa dipendenze
        # npm install (non npm ci) per tollerare dep platform-specific nel lockfile.
        # Bug npm noto #4828: optional deps tipo @rollup/rollup-android-arm-eabi
        # vengono registrate come required quando il lockfile è generato su ARM/Mac M
        # → npm ci fallisce su Linux x64 con EBADPLATFORM.
        # npm install rigenera/aggiorna il lockfile in modo platform-aware.
        run: npm install --no-audit --no-fund

      - name: Build produzione
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
