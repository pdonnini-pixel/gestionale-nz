[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect tutte le route a index.html (SPA)
# Nota: /.netlify/functions/* sono già accessibili nativamente da Netlify, non serve un redirect esplicito.
# La regola pre-esistente `from = "/.netlify/functions/*" to = "/.netlify/functions/:splat"`
# era marcata come invalid dal validator Netlify (prefisso /.netlify/* è riservato).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
