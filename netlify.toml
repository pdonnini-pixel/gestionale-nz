[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Netlify Functions — passthrough (prima dei redirect SPA)
[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Redirect tutte le route a index.html (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
